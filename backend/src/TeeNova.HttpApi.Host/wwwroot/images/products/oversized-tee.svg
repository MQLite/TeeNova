<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" width="400" height="420">
  <rect width="400" height="420" fill="#F5F0EB"/>
  <!-- Shadow -->
  <path d="M 100 68 L 38 98 L 18 178 L 78 196 L 86 175 L 86 372 L 314 372 L 314 175 L 322 196 L 382 178 L 362 98 L 300 68 C 282 110 242 128 200 128 C 158 128 118 110 100 68 Z" fill="rgba(0,0,0,0.08)" transform="translate(4,4)"/>
  <!-- Oversized T-shirt (wider sleeves) -->
  <path d="M 100 68 L 38 98 L 18 178 L 78 196 L 86 175 L 86 372 L 314 372 L 314 175 L 322 196 L 382 178 L 362 98 L 300 68 C 282 110 242 128 200 128 C 158 128 118 110 100 68 Z" fill="#C9B49A" stroke="#A68B6E" stroke-width="2"/>
  <!-- Collar -->
  <path d="M 100 68 Q 200 142 300 68" fill="none" stroke="#A68B6E" stroke-width="2"/>
  <!-- Dropped shoulder seams -->
  <path d="M 86 175 L 86 200" stroke="#B89F85" stroke-width="1.5" opacity="0.6"/>
  <path d="M 314 175 L 314 200" stroke="#B89F85" stroke-width="1.5" opacity="0.6"/>
  <!-- Print area indicator (larger for oversized) -->
  <rect x="128" y="185" width="144" height="130" rx="4" fill="none" stroke="#A68B6E" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
  <text x="200" y="254" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#A68B6E" opacity="0.7">Print Area</text>
  <!-- Street tag -->
  <rect x="162" y="320" width="76" height="24" rx="4" fill="#8B7355"/>
  <text x="200" y="336" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="#F5F0EB" letter-spacing="1">STREET</text>
  <!-- Product label -->
  <text x="200" y="400" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#6B5A45" letter-spacing="0.5">Oversized Street Tee</text>
</svg>
